<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil</title>

<style>
body{
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.perfil{
  background:#1a1a1a;
  padding:30px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

button{
  margin-top:15px;
  padding:10px;
  width:100%;
  border:none;
  background:white;
  color:black;
  cursor:pointer;
}

a{
  position:absolute;
  top:20px;
  left:20px;
  color:white;
}
</style>

</head>

<body>

<a href="index.html">⬅ Volver</a>

<div class="perfil" id="perfilBox"></div>

<script>

const user = JSON.parse(localStorage.getItem("usuarioActivo"));

if(!user){
  alert("Tenés que iniciar sesión");
  window.location.href = "auth.html";
}else{

  document.getElementById("perfilBox").innerHTML = `
    <h2>${user.nombre} ${user.apellido}</h2>
    <p>Email: ${user.email}</p>
    <p>Dirección: ${user.direccion}</p>

    <button onclick="logout()">Cerrar sesión</button>
  `;
}

function logout(){
  localStorage.removeItem("usuarioActivo");
  alert("Sesión cerrada");
  window.location.href = "index.html";
}

</script>

</body>
</html>
