<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Terraza</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background:#0d0d0d;
  color:#fff;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:1000;
}

.nav h2{
  font-weight:700;
  letter-spacing:2px;
}

.menu-nav{
  display:flex;
  gap:30px;
}

.menu-nav a{
  color:#bbb;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
  position:relative;
}

.menu-nav a:hover{
  color:white;
}

/* EFECTO SUBRAYADO */
.menu-nav a::after{
  content:"";
  position:absolute;
  width:0;
  height:2px;
  background:white;
  bottom:-5px;
  left:0;
  transition:0.3s;
}

.menu-nav a:hover::after{
  width:100%;
}

/* HERO */
.hero{
  height:90vh;
  background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.hero h1{
  font-size:50px;
  z-index:2;
}

.hero p{
  color:#ccc;
  z-index:2;
}

/* MENU */
.menu{
  padding:80px 20px;
  text-align:center;
}

.menu h2{
  margin-bottom:40px;
  font-size:30px;
}

.cards{
  display:flex;
  gap:25px;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  background:#1a1a1a;
  padding:25px;
  border-radius:15px;
  width:220px;
  transition:0.3s;
  border:1px solid #333;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#666;
}

.card h3{
  margin-bottom:10px;
}

.card p{
  color:#aaa;
}

/* BOTONES */
button{
  padding:10px 20px;
  border:none;
  background:white;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  border-radius:5px;
}

button:hover{
  background:#ddd;
}

/* CARRITO */
.carrito{
  padding:40px;
  background:#141414;
  border-top:1px solid #222;
}

#lista div{
  padding:10px;
  margin:5px 0;
  background:#1f1f1f;
  border-radius:5px;
  display:flex;
  justify-content:space-between;
}

/* LOGIN / REGISTRO */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:90vh;
}

.form-box{
  background:#1a1a1a;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.form-box h2{
  text-align:center;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#111;
  border:none;
  border-radius:5px;
  color:white;
}

input::placeholder{
  color:#777;
}

/* TEXTO TOGGLE */
.form-box p{
  text-align:center;
  margin-top:10px;
  color:#aaa;
  cursor:pointer;
}

.form-box p:hover{
  color:white;
}

/* WHATSAPP FLOAT */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
  cursor:pointer;
  transition:0.3s;
}

.whatsapp-float:hover{
  transform:scale(1.1);
}

/* RESPONSIVE */
@media(max-width:768px){

  .hero h1{
    font-size:30px;
  }

  .menu-nav{
    gap:15px;
  }

  .cards{
    flex-direction:column;
    align-items:center;
  }

}

#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;
  font-size:30px;
}


.galeria{
  padding:60px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:10px;
}

.grid img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.3s;
}

.grid img:hover{
  transform:scale(1.05);
}

.opiniones{
  padding:60px;
  text-align:center;
}

.anim{
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

.anim.show{
  opacity:1;
  transform:translateY(0);
}

.menu {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.menu h1 {
  text-align: center;
  margin-bottom: 30px;
}

.menu-section {
  margin-bottom: 30px;
}

.menu-section h2 {
  background: #000;
  color: #fff;
  padding: 10px;
  border-radius: 8px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #ccc;
}

.item span {
  font-size: 16px;
}

.destacado {
  color: #e63946;
  font-weight: bold;
}

.item button{
  background:#fff;
  color:#000;
  padding:5px 10px;
  border-radius:5px;
  font-weight:bold;
}

</style>
</head>

<body>

    

<div id="loader">
    <h1>La Terraza</h1>
</div>

<header class="nav">
  <h2>La Terraza</h2>
  <nav class="menu-nav" id="navMenu">
  <a href="#inicio">Inicio</a>
  <a href="#menu">Menú</a>
  <a href="#pedido">Pedido</a>

  <a href="perfil.html" id="perfilLink" style="display:none;">Perfil</a>
  <a href="auth.html" id="loginLink">Login</a>
</nav>
</header>

<!-- LOGIN / REGISTRO -->
<div class="container" id="auth">

  <div class="form-box" id="loginBox">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPass" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p onclick="mostrarRegistro()">Crear cuenta</p>
  </div>

  <div class="form-box hidden" id="registerBox">
    <h2>Registro</h2>
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="apellido" placeholder="Apellido">
    <input type="text" id="direccion" placeholder="Dirección">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="registrar()">Registrarse</button>
    <p onclick="mostrarLogin()">Ya tengo cuenta</p>
  </div>

</div>

<!-- CONTENIDO PRINCIPAL -->
<div id="app" class="hidden">

<section class="hero" id="inicio">
  <h1>Bienvenido a La Terraza</h1>
</section>

<section class="galeria anim">
  <h2>Galería</h2>

  <div class="grid">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
    <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">
  </div>
</section>

<section class="menu">

<div class="productos-grid">

  <div class="card-producto">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Hamburguesa">
    <h3>Hamburguesa completa</h3>
    <p>$250</p>
    <button onclick="agregar('Hamburguesa completa',250)">Agregar</button>
  </div>

  <div class="card-producto">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd" alt="Hamburguesa doble">
    <h3>Hamburguesa doble cheddar</h3>
    <p>$390</p>
    <button onclick="agregar('Hamburguesa doble cheddar',390)">Agregar</button>
  </div>

  <div class="card-producto">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" alt="Papas">
    <h3>Papas con cheddar</h3>
    <p>$280</p>
    <button onclick="agregar('Papas con cheddar',280)">Agregar</button>
  </div>

  <div class="card-producto">
    <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d" alt="Pizza">
    <h3>Pizzeta muzza</h3>
    <p>$280</p>
    <button onclick="agregar('Pizzeta muzza',280)">Agregar</button>
  </div>

</div>
</section>



<section class="carrito" id="pedido">
  <h2>Carrito</h2>
  <div id="lista"></div>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="finalizarPedido()">Enviar Pedido</button>
</section>


</div>

<script>

  const totalEl = document.getElementById("total");

  const user = JSON.parse(localStorage.getItem("usuarioActivo"));

/* LOGIN UI */
function mostrarRegistro(){
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

function mostrarLogin(){
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

/* REGISTRO */
function registrar(){
  const usuario = {
    nombre: nombre.value,
    apellido: apellido.value,
    direccion: direccion.value,
    email: email.value,
    password: password.value
  };

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  if(usuarios.find(u=>u.email===usuario.email)){
    alert("Usuario ya existe");
    return;
  }

  usuarios.push(usuario);
  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  alert("Registrado");
  mostrarLogin();
}

/* LOGIN */
function login(){
  const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

  const user = usuarios.find(u => 
    u.email === loginEmail.value && u.password === loginPass.value
  );

  if(user){
    localStorage.setItem("usuarioActivo", JSON.stringify(user));
    iniciarApp();
  }else{
    alert("Datos incorrectos");
  }
}

/* INICIAR APP */
function iniciarApp(){
  auth.style.display = "none";
  app.classList.remove("hidden");
}

/* RECORDAR SESIÓN */
window.onload = ()=>{
  const user = JSON.parse(localStorage.getItem("usuarioActivo"));
  if(user){
    iniciarApp();
  }
};

/* CARRITO */
let carrito = [];

function agregar(nombre, precio){
  carrito.push({nombre, precio});
  render();
}

function render(){
  lista.innerHTML="";
  let total=0;

  carrito.forEach(p=>{
    const div=document.createElement("div");
    div.textContent = p.nombre + " - $" + p.precio;
    lista.appendChild(div);
    total+=p.precio;
  });

  totalEl.textContent = total;
}

/* PAGO + WHATSAPP */
function finalizarPedido(){
  if(carrito.length === 0){
    alert("Carrito vacío");
    return;
  }

  let total=0;
  let productos="";

  carrito.forEach(p=>{
    productos += `${p.nombre} - $${p.precio}%0A`;
    total += p.precio;
  });

  const ok = confirm("Total: $" + total + " ¿Pagar?");
  if(!ok) return;

  const user = JSON.parse(localStorage.getItem("usuarioActivo"));

  const texto = `Pedido%0A
Cliente: ${user.nombre}%0A
Dirección: ${user.direccion}%0A
${productos}
Total: $${total}`;

  const numero = "598099253936";

  window.open(`https://wa.me/${numero}?text=${texto}`);

  carrito=[];
  render();
}


window.addEventListener("load", ()=>{
  document.getElementById("loader").style.display="none";
});


const elementos = document.querySelectorAll(".anim");

window.addEventListener("scroll", ()=>{
  elementos.forEach(el=>{
    const top = el.getBoundingClientRect().top;

    if(top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});


const loginLink = document.getElementById("loginLink");
const perfilLink = document.getElementById("perfilLink");

if(user){
  // Usuario logueado
  loginLink.style.display = "none";
  perfilLink.style.display = "inline";

}else{
  // Usuario NO logueado
  loginLink.style.display = "inline";
  perfilLink.style.display = "none";
}

if(user){
  perfilLink.textContent = "👤 " + user.nombre;
}

if(user){
  const logoutBtn = document.createElement("a");
  logoutBtn.textContent = "Salir";
  logoutBtn.style.cursor = "pointer";

  logoutBtn.onclick = ()=>{
    localStorage.removeItem("usuarioActivo");
    location.reload();
  };

  document.getElementById("navMenu").appendChild(logoutBtn);
}

</script>

</body>
</html>
